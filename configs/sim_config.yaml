### Configuration for dataset generation ###

paths:
  # The full path, including filename, for the output HDF5 dataset.
  output_path: "../datasets/MAXIMA-SWIN_20k_alpha_Al2O3_GE_dataset.hdf5"

calibrant: 'alpha_Al2O3'
detector: 
  alias: null
  max_shape: [2048, 2048]
  pixel_size: 200e-6
wavelength: 0.82656132288800e-10

geometry_ranges:
  dist: [0.20, 0.4]
  poni1: [0.040, 0.045]
  poni2: [0.035, 0.040]
  rot1: [-0.05, 0.05]
  rot2: [-0.30, -0.20]
  rot3: [-0.05, 0.05]

simulation_ranges:
  fwhm: [0.13, 0.20]
  imin: [2.0, 6.0]
  imax: [150.0, 300.0]

generation:
  num_images: 20000
  test_split_ratio: 0.1