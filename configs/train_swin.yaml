# Configuration for training a SWIN regression model.

paths:
  # Directory where the model checkpoint will be saved.
  output_dir: "path/to/output/directory"

data:
  # Path to the HDF5 file containing the dataset.
  hdf5_path: "../path/to/dataset.hdf5"
  train_group: "train"
  test_group: "test"

model:
  backbone: "microsoft/swin-base-patch4-window12-384-in22k"
  hidden_dim: 1024
  num_outputs: 6
  image_size: 1056
  name: "model_name.pth"
  multi_head: false

training:
  freeze_backbone: false
  batch_size: 8
  epochs: 30 
  learning_rate: 0.00002
  patience: 10
  # [dist, poni1, poni2, rot1, rot2, rot3]
  loss_weights: [10.0, 10.0, 10.0, 10.0, 10.0, 0.0]