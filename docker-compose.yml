services:
  maxima-vit:
    build:
      context: .
      dockerfile: Dockerfile
    image: maxima-vit:dev
    working_dir: /app
    volumes:
      - ./:/app
    ports:
      - "8888:8888"
    environment:
      PYTHONUNBUFFERED: "1"
      JUPYTER_TOKEN: ${JUPYTER_TOKEN:-maxima}
    command: >
      jupyter lab --ip=0.0.0.0 --port=8888 --no-browser --allow-root
      --NotebookApp.token=${JUPYTER_TOKEN:-maxima}
    gpus: all
    tty: true
    stdin_open: true